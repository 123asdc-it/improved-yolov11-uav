# YOLOv11n-Improved: 无人机小目标检测优化版
# 改进: P2小目标检测头 + EMA注意力 + PConv轻量化 + BiFPN加权融合

nc: 1
scales:
  n: [0.50, 0.25, 1024]

# Backbone (with EMA attention)
# Channel trace (after width=0.25): 16→32→64→64→128→128→128→128→256→256→256→256
backbone:
  - [-1, 1, Conv, [64, 3, 2]]          # 0-P1/2  → 16ch
  - [-1, 1, Conv, [128, 3, 2]]         # 1-P2/4  → 32ch
  - [-1, 2, C3k2, [256, False, 0.25]]  # 2       → 64ch
  - [-1, 1, Conv, [256, 3, 2]]         # 3-P3/8  → 64ch
  - [-1, 2, C3k2, [512, False, 0.25]]  # 4       → 128ch
  - [-1, 1, EMA, []]                   # 5 ★EMA  → 128ch
  - [-1, 1, Conv, [512, 3, 2]]         # 6-P4/16 → 128ch
  - [-1, 2, C3k2, [512, True]]         # 7       → 128ch
  - [-1, 1, EMA, []]                   # 8 ★EMA  → 128ch
  - [-1, 1, Conv, [1024, 3, 2]]        # 9-P5/32 → 256ch
  - [-1, 2, C3k2, [1024, True]]        # 10      → 256ch
  - [-1, 1, SPPF, [1024, 5]]           # 11      → 256ch
  - [-1, 2, C2PSA, [1024]]             # 12      → 256ch

# Head: P2 detection + PConv + BiFPN
# Top-down: P5→P4→P3→P2, then Bottom-up: P2→P3→P4→P5
head:
  # --- Top-down path ---
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]  # 13      → 256ch (P4 size)
  - [[-1, 8], 1, BiFPN_Concat, [1]]              # 14 ★BiFPN → 256+128=384ch
  - [-1, 2, PConv_C3k2, [512]]                   # 15 ★PConv → 128ch

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 16      → 128ch (P3 size)
  - [[-1, 5], 1, BiFPN_Concat, [1]]               # 17 ★BiFPN → 128+128=256ch
  - [-1, 2, PConv_C3k2, [256]]                    # 18 ★PConv → 64ch  (P3/8)

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]    # 19      → 64ch (P2 size)
  - [[-1, 2], 1, BiFPN_Concat, [1]]                # 20 ★BiFPN → 64+64=128ch
  - [-1, 2, PConv_C3k2, [128]]                     # 21 ★PConv → 32ch  (P2/4) ★P2检测头

  # --- Bottom-up path ---
  - [-1, 1, Conv, [128, 3, 2]]                     # 22      → 32ch
  - [[-1, 18], 1, BiFPN_Concat, [1]]               # 23 ★BiFPN → 32+64=96ch
  - [-1, 2, PConv_C3k2, [256]]                     # 24 ★PConv → 64ch  (P3/8)

  - [-1, 1, Conv, [256, 3, 2]]                     # 25      → 64ch
  - [[-1, 15], 1, BiFPN_Concat, [1]]               # 26 ★BiFPN → 64+128=192ch
  - [-1, 2, PConv_C3k2, [512]]                     # 27 ★PConv → 128ch (P4/16)

  - [-1, 1, Conv, [512, 3, 2]]                     # 28      → 128ch
  - [[-1, 12], 1, BiFPN_Concat, [1]]               # 29 ★BiFPN → 128+256=384ch
  - [-1, 2, C3k2, [1024, True]]                    # 30      → 256ch (P5/32)

  - [[21, 24, 27, 30], 1, Detect, [nc]]            # 31 Detect(P2, P3, P4, P5)
